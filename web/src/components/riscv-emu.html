<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RISC-V Emulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0e0f11;
    --bg2:       #141619;
    --bg3:       #1b1d21;
    --border:    #2a2d33;
    --border2:   #363a42;
    --text:      #d4d8e0;
    --text2:     #7a8090;
    --text3:     #4a4f5c;
    --teal:      #2dd4bf;
    --teal-dim:  #1a6b62;
    --teal-bg:   rgba(45,212,191,0.07);
    --amber:     #f59e0b;
    --amber-dim: #7a4f05;
    --red:       #f87171;
    --red-dim:   #7a2020;
    --red-bg:    rgba(248,113,113,0.07);
    --mono:      'JetBrains Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
  }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    overflow: hidden;
  }

  #root { height: 100vh; width: 100vw; display: flex; flex-direction: column; }

  /* ── UPLOAD STATE ─────────────────────────────────────────────── */
  .upload-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding: 40px;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }

  .upload-screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px);
    opacity: 0.25;
    pointer-events: none;
  }

  .upload-logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    position: relative;
    z-index: 1;
  }

  .upload-logo-mark {
    width: 56px; height: 56px;
    border: 2px solid var(--teal);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--teal);
    letter-spacing: 0.05em;
    position: relative;
  }
  .upload-logo-mark::before, .upload-logo-mark::after {
    content: '';
    position: absolute;
    width: 8px; height: 8px;
    border: 2px solid var(--teal);
    background: var(--bg);
  }
  .upload-logo-mark::before { top: -6px; left: -6px; border-right: none; border-bottom: none; }
  .upload-logo-mark::after  { bottom: -6px; right: -6px; border-left: none; border-top: none; }

  .upload-logo-title {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text2);
  }

  .upload-zone {
    position: relative;
    z-index: 1;
    width: min(520px, 90vw);
    border: 1.5px dashed var(--border2);
    background: var(--bg2);
    padding: 48px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--teal);
    background: var(--teal-bg);
  }
  .upload-zone-icon {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text3);
    transition: color 0.2s;
  }
  .upload-zone:hover .upload-zone-icon,
  .upload-zone.drag-over .upload-zone-icon { color: var(--teal); }

  .upload-zone-label {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text2);
    text-align: center;
    line-height: 1.7;
  }
  .upload-zone-label span {
    display: block;
    font-size: 11px;
    color: var(--text3);
    margin-top: 4px;
  }

  .upload-btn {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--teal);
    border: none;
    padding: 9px 22px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .upload-btn:hover { opacity: 0.85; }

  .upload-hint {
    position: relative; z-index: 1;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
  }

  /* ── HEADER BAR ──────────────────────────────────────────────── */
  .header {
    height: 44px;
    min-height: 44px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    flex-shrink: 0;
  }

  .header-logo {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--teal);
    text-transform: uppercase;
    white-space: nowrap;
    border: 1px solid var(--teal-dim);
    padding: 3px 8px;
  }

  .header-file {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .header-file strong { color: var(--text); font-weight: 500; }

  .status-pill {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 10px;
    border: 1px solid;
    display: flex; align-items: center; gap: 6px;
  }
  .status-pill.running { color: var(--teal); border-color: var(--teal-dim); background: var(--teal-bg); }
  .status-pill.halted  { color: var(--text2); border-color: var(--border2); background: transparent; }
  .status-pill.trap    { color: var(--red); border-color: var(--red-dim); background: var(--red-bg); }
  .status-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: currentColor;
  }
  .status-pill.running .status-dot { animation: pulse-dot 1.4s ease-in-out infinite; }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.3; }
  }

  .header-btn {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text2);
    background: transparent;
    border: 1px solid var(--border2);
    padding: 5px 12px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .header-btn:hover { color: var(--text); border-color: var(--text2); }
  .header-btn.danger:hover { color: var(--red); border-color: var(--red-dim); }

  /* ── BENTO GRID ──────────────────────────────────────────────── */
  .bento {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr 340px;
    grid-template-rows: 1fr auto 1fr;
    gap: 1px;
    background: var(--border);
    overflow: hidden;
    min-height: 0;
  }

  .cell {
    background: var(--bg2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    transition: background 0.15s;
  }
  .cell:hover { background: var(--bg3); }

  .cell-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .cell-label {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text3);
  }
  .cell-label.accent { color: var(--teal); }
  .cell-badge {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text3);
    border: 1px solid var(--border);
    padding: 1px 6px;
  }

  .cell-body {
    flex: 1;
    overflow: hidden;
    padding: 14px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  /* ── CELL: CURRENT INSTRUCTION ──────────────────────────────── */
  .instr-cell {
    grid-column: 1 / 3;
    grid-row: 1 / 2;
  }

  .instr-address {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 8px;
    letter-spacing: 0.08em;
  }
  .instr-address span { color: var(--teal); }

  .instr-main {
    display: flex;
    align-items: baseline;
    gap: 14px;
    flex-wrap: wrap;
  }

  .instr-opcode {
    font-family: var(--mono);
    font-size: 36px;
    font-weight: 700;
    color: var(--teal);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .instr-operands {
    font-family: var(--mono);
    font-size: 24px;
    font-weight: 300;
    color: var(--text);
    line-height: 1;
    letter-spacing: 0.01em;
  }

  .instr-encoding {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    margin-top: 10px;
    letter-spacing: 0.05em;
  }

  .instr-desc {
    margin-top: 14px;
    padding: 10px 14px;
    background: var(--bg);
    border-left: 2px solid var(--teal-dim);
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
    line-height: 1.6;
  }
  .instr-desc strong { color: var(--text); font-weight: 500; }

  .instr-fields {
    margin-top: 12px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .instr-field {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .instr-field-label {
    font-family: var(--mono);
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text3);
  }
  .instr-field-value {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
  }
  .instr-field-value.teal { color: var(--teal); }

  /* ── CELL: REGISTERS ─────────────────────────────────────────── */
  .reg-cell {
    grid-column: 3 / 4;
    grid-row: 1 / 4;
  }

  .reg-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .reg-item {
    background: var(--bg2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 8px;
    transition: background 0.3s;
    min-height: 0;
  }
  .reg-item.highlighted {
    background: var(--teal-bg);
    animation: reg-flash 0.6s ease-out forwards;
  }
  @keyframes reg-flash {
    0%  { background: rgba(45,212,191,0.25); }
    100%{ background: var(--teal-bg); }
  }

  .reg-name {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    color: var(--text3);
    letter-spacing: 0.06em;
    width: 22px;
  }
  .reg-alias {
    font-family: var(--mono);
    font-size: 8px;
    color: var(--text3);
    width: 30px;
    text-align: center;
  }
  .reg-value {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text);
    letter-spacing: 0.04em;
  }
  .reg-item.highlighted .reg-value { color: var(--teal); }
  .reg-item.nonzero .reg-name { color: var(--text2); }

  /* ── CELL: CPU STATS ─────────────────────────────────────────── */
  .stats-cell {
    grid-column: 1 / 3;
    grid-row: 2 / 3;
  }

  .stats-row {
    display: flex;
    gap: 1px;
    flex: 1;
    background: var(--border);
  }

  .stat-card {
    flex: 1;
    background: var(--bg2);
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .stat-label {
    font-family: var(--mono);
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text3);
  }
  .stat-value {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
    line-height: 1;
  }
  .stat-value.teal  { color: var(--teal); }
  .stat-value.amber { color: var(--amber); }
  .stat-value.red   { color: var(--red); }
  .stat-sub {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text3);
  }

  /* ── CELL: PIPELINE ─────────────────────────────────────────── */
  .pipeline-cell {
    grid-column: 1 / 2;
    grid-row: 3 / 4;
  }

  .pipeline-flow {
    display: flex;
    align-items: center;
    gap: 0;
    flex: 1;
  }

  .pipeline-stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    position: relative;
    transition: border-color 0.3s, background 0.3s;
  }
  .pipeline-stage.active {
    border-color: var(--teal);
    background: var(--teal-bg);
  }
  .pipeline-stage.done {
    border-color: var(--border2);
    background: var(--bg2);
  }
  .pipeline-arrow {
    font-family: var(--mono);
    font-size: 16px;
    color: var(--border2);
    padding: 0 6px;
    flex-shrink: 0;
    margin-top: -12px;
  }
  .pipeline-stage.active + .pipeline-arrow { color: var(--teal-dim); }

  .pipeline-stage-name {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text3);
  }
  .pipeline-stage.active .pipeline-stage-name { color: var(--teal); }
  .pipeline-stage.done .pipeline-stage-name { color: var(--text2); }

  .pipeline-stage-val {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    text-align: center;
    word-break: break-all;
  }
  .pipeline-stage.active .pipeline-stage-val { color: var(--text); }

  .pipeline-icon {
    font-size: 18px;
    opacity: 0.3;
  }
  .pipeline-stage.active .pipeline-icon { opacity: 1; }

  /* ── CELL: MEMORY ─────────────────────────────────────────────── */
  .memory-cell {
    grid-column: 2 / 3;
    grid-row: 3 / 4;
  }

  .hex-dump {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
    font-family: var(--mono);
    font-size: 10px;
    line-height: 1.7;
  }

  .hex-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 1px 0;
    border-bottom: 1px solid transparent;
  }
  .hex-row.current-pc {
    background: rgba(45,212,191,0.05);
    border-bottom-color: var(--border);
  }

  .hex-addr {
    color: var(--text3);
    width: 56px;
    flex-shrink: 0;
    letter-spacing: 0.04em;
  }
  .hex-row.current-pc .hex-addr { color: var(--teal); }

  .hex-bytes {
    display: flex;
    gap: 5px;
    flex: 1;
  }

  .hex-byte {
    width: 16px;
    text-align: center;
    color: var(--text2);
  }
  .hex-byte.pc-byte { color: var(--teal); font-weight: 600; }
  .hex-byte.zero { color: var(--text3); }

  .hex-spacer { width: 6px; }

  .hex-ascii {
    color: var(--text3);
    letter-spacing: 0.04em;
    min-width: 60px;
  }

  /* ── CELL: CONTROLS ─────────────────────────────────────────── */
  .controls-cell {
    grid-column: 1 / 3;
  }

  .controls-body {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    height: 100%;
  }

  .ctrl-btn {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 8px 18px;
    border: 1px solid;
    background: transparent;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ctrl-btn.primary {
    color: var(--teal);
    border-color: var(--teal-dim);
  }
  .ctrl-btn.primary:hover {
    background: var(--teal);
    color: var(--bg);
    border-color: var(--teal);
  }
  .ctrl-btn.primary:active { opacity: 0.8; }

  .ctrl-btn.secondary {
    color: var(--text2);
    border-color: var(--border2);
  }
  .ctrl-btn.secondary:hover {
    color: var(--text);
    border-color: var(--text2);
    background: var(--bg3);
  }

  .ctrl-btn.danger {
    color: var(--red);
    border-color: var(--red-dim);
  }
  .ctrl-btn.danger:hover {
    background: var(--red);
    color: var(--bg);
    border-color: var(--red);
  }

  .ctrl-btn.run-n {
    color: var(--amber);
    border-color: var(--amber-dim);
  }
  .ctrl-btn.run-n:hover {
    background: var(--amber);
    color: var(--bg);
    border-color: var(--amber);
  }

  .ctrl-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    pointer-events: none;
  }

  .ctrl-separator {
    width: 1px;
    height: 28px;
    background: var(--border2);
  }

  .ctrl-n-input {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--amber);
    background: var(--bg);
    border: 1px solid var(--amber-dim);
    padding: 7px 8px;
    width: 70px;
    text-align: center;
    outline: none;
  }
  .ctrl-n-input:focus { border-color: var(--amber); }

  .ctrl-hint {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text3);
    margin-left: auto;
    letter-spacing: 0.08em;
  }
  .ctrl-hint kbd {
    border: 1px solid var(--border2);
    padding: 1px 5px;
    background: var(--bg);
    font-family: var(--mono);
    font-size: 9px;
  }

  /* ── SCROLLBAR ──────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── RISC-V register aliases ───────────────────────────────────────
const REG_ALIASES = [
  'zero','ra','sp','gp','tp','t0','t1','t2',
  's0','s1','a0','a1','a2','a3','a4','a5',
  'a6','a7','s2','s3','s4','s5','s6','s7',
  's8','s9','s10','s11','t3','t4','t5','t6'
];

// ── Synthetic program: a simple loop that adds values ────────────
const DEMO_PROGRAM = [
  { addr: 0x00000000, raw: 0x00500513, opcode: 'ADDI',  operands: 'a0, x0, 5',   desc: 'Set <strong>a0</strong> ← x0 + 5 (immediate)',           fields: {rd:'a0',rs1:'x0',imm:'0x005'},  type:'I', rd:10, rs1:0, rs2:-1, imm:5    },
  { addr: 0x00000004, raw: 0x00A00593, opcode: 'ADDI',  operands: 'a1, x0, 10',  desc: 'Set <strong>a1</strong> ← x0 + 10 (immediate)',          fields: {rd:'a1',rs1:'x0',imm:'0x00A'},  type:'I', rd:11, rs1:0, rs2:-1, imm:10   },
  { addr: 0x00000008, raw: 0x00B50633, opcode: 'ADD',   operands: 'a2, a0, a1',  desc: 'Set <strong>a2</strong> ← a0 + a1 = 5 + 10',            fields: {rd:'a2',rs1:'a0',rs2:'a1'},     type:'R', rd:12, rs1:10, rs2:11, imm:null },
  { addr: 0x0000000C, raw: 0x00100313, opcode: 'ADDI',  operands: 'a3, x0, 1',   desc: 'Set <strong>a3</strong> ← x0 + 1 (loop counter seed)',   fields: {rd:'a3',rs1:'x0',imm:'0x001'},  type:'I', rd:13, rs1:0, rs2:-1, imm:1    },
  { addr: 0x00000010, raw: 0x00130313, opcode: 'ADDI',  operands: 'a3, a3, 1',   desc: 'Increment <strong>a3</strong> ← a3 + 1 (loop iter)',     fields: {rd:'a3',rs1:'a3',imm:'0x001'},  type:'I', rd:13, rs1:13, rs2:-1, imm:1   },
  { addr: 0x00000014, raw: 0x00561533, opcode: 'SLL',   operands: 'a0, a2, a3',  desc: 'Logical shift <strong>a0</strong> ← a2 << a3',           fields: {rd:'a0',rs1:'a2',rs2:'a3'},     type:'R', rd:10, rs1:12, rs2:13, imm:null },
  { addr: 0x00000018, raw: 0x0062E333, opcode: 'OR',    operands: 'a3, a0, a1', desc: 'Bitwise OR <strong>a3</strong> ← a0 | a1',               fields: {rd:'a3',rs1:'a0',rs2:'a1'},     type:'R', rd:13, rs1:10, rs2:11, imm:null },
  { addr: 0x0000001C, raw: 0xFEE310E3, opcode: 'BNE',   operands: 'a3, a4, -20', desc: 'Branch if <strong>a3 ≠ a4</strong> → PC - 20',           fields: {rs1:'a3',rs2:'a4',offset:'-20'}, type:'B', rd:-1, rs1:13, rs2:14, imm:-20 },
  { addr: 0x00000020, raw: 0x00000073, opcode: 'ECALL', operands: '',            desc: 'Environment call — transfer to OS/runtime handler',       fields: {},                              type:'E', rd:-1, rs1:-1, rs2:-1, imm:null },
];

function makeInitialRegisters() {
  return new Array(32).fill(0);
}

function makeInitialMemory(prog) {
  const mem = new Uint8Array(256);
  prog.forEach(instr => {
    const addr = instr.addr;
    const raw  = instr.raw;
    mem[addr]   = (raw) & 0xFF;
    mem[addr+1] = (raw >> 8) & 0xFF;
    mem[addr+2] = (raw >> 16) & 0xFF;
    mem[addr+3] = (raw >> 24) & 0xFF;
  });
  return mem;
}

function applyInstruction(instr, regs) {
  const next = [...regs];
  switch(instr.opcode) {
    case 'ADDI': if(instr.rd > 0) next[instr.rd] = (regs[instr.rs1] + instr.imm) | 0; break;
    case 'ADD':  if(instr.rd > 0) next[instr.rd] = (regs[instr.rs1] + regs[instr.rs2]) | 0; break;
    case 'SLL':  if(instr.rd > 0) next[instr.rd] = (regs[instr.rs1] << (regs[instr.rs2] & 0x1f)) | 0; break;
    case 'OR':   if(instr.rd > 0) next[instr.rd] = (regs[instr.rs1] | regs[instr.rs2]) | 0; break;
    default: break;
  }
  return next;
}

function toHex(n, width=8) {
  return '0x' + (n >>> 0).toString(16).toUpperCase().padStart(width, '0');
}
function toHexByte(n) { return (n & 0xFF).toString(16).toUpperCase().padStart(2,'0'); }

// ── Pipeline stage ────────────────────────────────────────────────
function PipelineCell({ instruction, pipelineStage }) {
  const stages = [
    { name: 'FETCH',   icon: '⬇', val: instruction ? toHex(instruction.addr,8) : '—' },
    { name: 'DECODE',  icon: '⚙', val: instruction ? instruction.opcode : '—' },
    { name: 'EXECUTE', icon: '▶', val: instruction ? (instruction.operands || instruction.opcode) : '—' },
  ];
  return (
    <div className="cell pipeline-cell">
      <div className="cell-header">
        <span className="cell-label">Pipeline</span>
        <span className="cell-badge">{instruction ? `stage ${pipelineStage+1}/3` : 'idle'}</span>
      </div>
      <div className="cell-body">
        <div className="pipeline-flow">
          {stages.map((s, i) => (
            <React.Fragment key={s.name}>
              <div className={`pipeline-stage ${i < pipelineStage ? 'done' : i === pipelineStage ? 'active' : ''}`}>
                <span className="pipeline-stage-name">{s.name}</span>
                <span className="pipeline-icon">{s.icon}</span>
                <span className="pipeline-stage-val">{s.val}</span>
              </div>
              {i < 2 && <span className="pipeline-arrow">→</span>}
            </React.Fragment>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Memory Viewer ─────────────────────────────────────────────────
function MemoryCell({ memory, pc }) {
  const BYTES_PER_ROW = 8;
  const pcAligned = Math.floor(pc / BYTES_PER_ROW) * BYTES_PER_ROW;
  const startAddr  = Math.max(0, pcAligned - BYTES_PER_ROW * 3);
  const endAddr    = Math.min(memory.length, startAddr + 64);
  const rows = [];
  for (let a = startAddr; a < endAddr; a += BYTES_PER_ROW) {
    rows.push(a);
  }

  const isPC = (addr) => addr >= pc && addr < pc + 4;

  return (
    <div className="cell memory-cell">
      <div className="cell-header">
        <span className="cell-label">Memory</span>
        <span className="cell-badge">@{toHex(pc)}</span>
      </div>
      <div className="cell-body" style={{padding:'8px 12px'}}>
        <div className="hex-dump">
          {rows.map(rowAddr => {
            const bytes = [];
            for (let i = 0; i < BYTES_PER_ROW; i++) bytes.push(rowAddr + i < memory.length ? memory[rowAddr + i] : 0);
            const hasPC = bytes.some((_, i) => isPC(rowAddr + i));
            const ascii = bytes.map(b => (b >= 32 && b < 127) ? String.fromCharCode(b) : '·').join('');
            return (
              <div key={rowAddr} className={`hex-row ${hasPC ? 'current-pc' : ''}`}>
                <span className="hex-addr">{toHex(rowAddr)}</span>
                <div className="hex-bytes">
                  {bytes.map((b, i) => (
                    <React.Fragment key={i}>
                      {i === 4 && <span className="hex-spacer"></span>}
                      <span className={`hex-byte ${isPC(rowAddr+i) ? 'pc-byte' : b===0 ? 'zero' : ''}`}>{toHexByte(b)}</span>
                    </React.Fragment>
                  ))}
                </div>
                <span className="hex-ascii">{ascii}</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Register File ─────────────────────────────────────────────────
function RegisterCell({ registers, highlightReg }) {
  return (
    <div className="cell reg-cell">
      <div className="cell-header">
        <span className="cell-label accent">Registers</span>
        <span className="cell-badge">RV32I · x0–x31</span>
      </div>
      <div className="cell-body" style={{padding:0}}>
        <div className="reg-grid">
          {registers.map((val, i) => (
            <div key={i} className={`reg-item ${i === highlightReg ? 'highlighted' : ''} ${val !== 0 ? 'nonzero' : ''}`}>
              <span className="reg-name">x{i}</span>
              <span className="reg-alias">{REG_ALIASES[i]}</span>
              <span className="reg-value">{toHex(val)}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#2dd4bf",
  "showPipelineAnimation": true,
  "theme": "dark",
  "fontSize": "normal"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const [loaded, setLoaded]         = useState(false);
  const [filename, setFilename]     = useState('');
  const [pc, setPc]                 = useState(0);
  const [cycle, setCycle]           = useState(0);
  const [registers, setRegisters]   = useState(makeInitialRegisters);
  const [memory, setMemory]         = useState(() => makeInitialMemory(DEMO_PROGRAM));
  const [cpuState, setCpuState]     = useState('halted'); // running | halted | trap
  const [trapCause, setTrapCause]   = useState('—');
  const [highlightReg, setHighlightReg] = useState(null);
  const [pipelineStage, setPipelineStage] = useState(0);
  const [dragOver, setDragOver]     = useState(false);
  const [runN, setRunN]             = useState(10);
  const [animating, setAnimating]   = useState(false);
  const highlightTimerRef           = useRef(null);
  const runIntervalRef              = useRef(null);
  const fileInputRef                = useRef(null);

  const pcIndex = DEMO_PROGRAM.findIndex(i => i.addr === pc);
  const currentInstr = pcIndex >= 0 ? DEMO_PROGRAM[pcIndex] : null;
  const isHalted = cpuState === 'trap' || (pcIndex < 0);

  // Reset highlight timer
  function flashReg(rd) {
    if (rd < 0) return;
    setHighlightReg(rd);
    clearTimeout(highlightTimerRef.current);
    highlightTimerRef.current = setTimeout(() => setHighlightReg(null), 800);
  }

  // Animate pipeline stages
  function animatePipeline(cb) {
    if (!tweaks.showPipelineAnimation) { cb(); return; }
    setAnimating(true);
    setPipelineStage(0);
    const t1 = setTimeout(() => setPipelineStage(1), 200);
    const t2 = setTimeout(() => setPipelineStage(2), 400);
    const t3 = setTimeout(() => { setAnimating(false); cb(); }, 600);
    return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
  }

  function doStep() {
    if (isHalted || animating) return;
    const instr = currentInstr;
    if (!instr) return;

    animatePipeline(() => {
      const nextRegs = applyInstruction(instr, registers);
      setRegisters(nextRegs);
      flashReg(instr.rd);
      setCycle(c => c + 1);

      if (instr.opcode === 'ECALL') {
        setCpuState('trap');
        setTrapCause('ECALL (syscall)');
        return;
      }

      // BNE: branch logic
      if (instr.opcode === 'BNE') {
        const rs1 = nextRegs[instr.rs1];
        const rs2 = nextRegs[instr.rs2];
        if (rs1 !== rs2) {
          const newPc = (instr.addr + instr.imm);
          const target = DEMO_PROGRAM.findIndex(i => i.addr === newPc);
          if (target >= 0) { setPc(DEMO_PROGRAM[target].addr); return; }
        }
      }

      const nextIdx = pcIndex + 1;
      if (nextIdx >= DEMO_PROGRAM.length) {
        setCpuState('halted');
      } else {
        setPc(DEMO_PROGRAM[nextIdx].addr);
        setCpuState('running');
      }
    });
  }

  function doReset() {
    clearInterval(runIntervalRef.current);
    setPc(DEMO_PROGRAM[0].addr);
    setCycle(0);
    setRegisters(makeInitialRegisters());
    setMemory(makeInitialMemory(DEMO_PROGRAM));
    setCpuState('halted');
    setTrapCause('—');
    setHighlightReg(null);
    setPipelineStage(0);
    setAnimating(false);
  }

  function doRunN() {
    if (isHalted) return;
    let stepsLeft = parseInt(runN) || 10;
    setCpuState('running');
    runIntervalRef.current = setInterval(() => {
      if (stepsLeft <= 0) { clearInterval(runIntervalRef.current); return; }
      stepsLeft--;
      doStep();
    }, tweaks.showPipelineAnimation ? 700 : 80);
  }

  function doPause() {
    clearInterval(runIntervalRef.current);
    setCpuState('halted');
  }

  // Keyboard shortcut: Space = step
  useEffect(() => {
    function onKey(e) {
      if (!loaded) return;
      if (e.target.tagName === 'INPUT') return;
      if (e.code === 'Space') { e.preventDefault(); doStep(); }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [loaded, isHalted, animating, currentInstr, pcIndex, registers, pc, cycle, tweaks]);

  function handleFile(file) {
    if (!file) return;
    setFilename(file.name);
    doReset();
    setTimeout(() => {
      setLoaded(true);
      setCpuState('halted');
    }, 200);
  }

  // ── CSS custom property injection for accent color ───────────
  useEffect(() => {
    document.documentElement.style.setProperty('--teal', tweaks.accentColor);
    // derive dimmed & bg from chosen color
    document.documentElement.style.setProperty('--teal-bg', tweaks.accentColor + '12');
  }, [tweaks.accentColor]);

  const statusLabel = cpuState === 'running' ? 'Running' : cpuState === 'trap' ? 'Trap' : 'Halted';

  if (!loaded) {
    return (
      <>
        <div
          className={`upload-screen ${dragOver ? 'drag-over' : ''}`}
          onDragOver={e => { e.preventDefault(); setDragOver(true); }}
          onDragLeave={() => setDragOver(false)}
          onDrop={e => { e.preventDefault(); setDragOver(false); handleFile(e.dataTransfer.files[0]); }}
        >
          <div className="upload-logo">
            <div className="upload-logo-mark">RV32</div>
            <div className="upload-logo-title">RISC-V Emulator</div>
          </div>
          <div
            className={`upload-zone ${dragOver ? 'drag-over' : ''}`}
            onClick={() => fileInputRef.current && fileInputRef.current.click()}
            onDragOver={e => { e.preventDefault(); setDragOver(true); }}
          >
            <div className="upload-zone-icon">
              <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="8" y="18" width="24" height="16" rx="0" stroke="currentColor" strokeWidth="1.5"/>
                <path d="M20 4 L20 20 M14 10 L20 4 L26 10" stroke="currentColor" strokeWidth="1.5" strokeLinecap="square"/>
              </svg>
            </div>
            <div className="upload-zone-label">
              Drop a RISC-V binary or ELF file here
              <span>.bin · .elf · .hex — or click to browse</span>
            </div>
            <button className="upload-btn" onClick={e => { e.stopPropagation(); fileInputRef.current && fileInputRef.current.click(); }}>
              Choose File
            </button>
          </div>
          <div className="upload-hint">⎯ or load the demo program ⎯</div>
          <button className="upload-btn" style={{position:'relative',zIndex:1}} onClick={() => { setFilename('demo_loop.bin'); setLoaded(true); setCpuState('halted'); }}>
            Load Demo
          </button>
          <input ref={fileInputRef} type="file" accept=".bin,.elf,.hex" style={{display:'none'}} onChange={e => handleFile(e.target.files[0])} />
        </div>

        <TweaksPanel>
          <TweakSection label="Accent Color" />
          <TweakColor label="Accent" value={tweaks.accentColor} onChange={v => setTweak('accentColor', v)} />
          <TweakSection label="Pipeline" />
          <TweakToggle label="Animate pipeline" value={tweaks.showPipelineAnimation} onChange={v => setTweak('showPipelineAnimation', v)} />
        </TweaksPanel>
      </>
    );
  }

  return (
    <>
      {/* Header */}
      <div className="header">
        <div className="header-logo">RV32I</div>
        <div className="header-file"><strong>{filename}</strong></div>
        <div className={`status-pill ${cpuState}`}>
          <span className="status-dot"></span>
          {statusLabel}
          {cpuState === 'trap' && <span style={{color:'var(--text3)',marginLeft:4,fontSize:'9px'}}>{trapCause}</span>}
        </div>
        <button className="header-btn danger" onClick={() => { doReset(); setLoaded(false); }}>Unload</button>
      </div>

      {/* Bento Grid */}
      <div className="bento">

        {/* 1. Current Instruction */}
        <div className="cell instr-cell">
          <div className="cell-header">
            <span className="cell-label accent">Current Instruction</span>
            {currentInstr && <span className="cell-badge">{currentInstr.type}-type</span>}
          </div>
          <div className="cell-body">
            {currentInstr ? (
              <>
                <div className="instr-address">
                  addr <span>{toHex(currentInstr.addr)}</span>
                  &nbsp;&nbsp;raw <span style={{color:'var(--text2)'}}>{toHex(currentInstr.raw)}</span>
                </div>
                <div className="instr-main">
                  <span className="instr-opcode">{currentInstr.opcode}</span>
                  {currentInstr.operands && <span className="instr-operands">{currentInstr.operands}</span>}
                </div>
                <div className="instr-encoding">
                  {currentInstr.raw.toString(2).padStart(32,'0').match(/.{4}/g).join(' ')}
                </div>
                <div className="instr-desc" dangerouslySetInnerHTML={{__html: currentInstr.desc}}></div>
                <div className="instr-fields">
                  {Object.entries(currentInstr.fields).map(([k,v]) => (
                    <div key={k} className="instr-field">
                      <span className="instr-field-label">{k}</span>
                      <span className={`instr-field-value ${k==='rd' ? 'teal' : ''}`}>{v}</span>
                    </div>
                  ))}
                </div>
              </>
            ) : (
              <div style={{fontFamily:'var(--mono)',fontSize:'13px',color:'var(--text3)',marginTop:'auto',marginBottom:'auto',textAlign:'center'}}>
                {cpuState === 'trap' ? `⚠ Trap: ${trapCause}` : '— program halted —'}
              </div>
            )}
          </div>
        </div>

        {/* 2. Register File */}
        <RegisterCell registers={registers} highlightReg={highlightReg} />

        {/* 3. CPU Stats */}
        <div className="cell stats-cell">
          <div className="cell-header">
            <span className="cell-label">CPU State</span>
          </div>
          <div className="cell-body" style={{padding:0}}>
            <div className="stats-row">
              <div className="stat-card">
                <span className="stat-label">Program Counter</span>
                <span className="stat-value teal" style={{fontSize:'16px',letterSpacing:'0.04em'}}>{toHex(pc)}</span>
                <span className="stat-sub">instr {pcIndex >= 0 ? pcIndex+1 : '—'} / {DEMO_PROGRAM.length}</span>
              </div>
              <div className="stat-card">
                <span className="stat-label">Cycles</span>
                <span className="stat-value">{cycle}</span>
                <span className="stat-sub">executed</span>
              </div>
              <div className="stat-card">
                <span className="stat-label">CPU Status</span>
                <span className={`stat-value ${cpuState === 'running' ? 'teal' : cpuState === 'trap' ? 'red' : ''}`}>{statusLabel.toUpperCase()}</span>
                <span className="stat-sub">state machine</span>
              </div>
              <div className="stat-card">
                <span className="stat-label">Trap Cause</span>
                <span className={`stat-value ${cpuState === 'trap' ? 'red' : ''}`} style={{fontSize:'12px',marginTop:4}}>{cpuState === 'trap' ? trapCause : '—'}</span>
                <span className="stat-sub">mcause</span>
              </div>
            </div>
          </div>
        </div>

        {/* 4. Pipeline */}
        <PipelineCell instruction={currentInstr} pipelineStage={animating ? pipelineStage : 2} />

        {/* 5. Memory Viewer */}
        <MemoryCell memory={memory} pc={pc} />

        {/* 6. Controls — spans full bottom width (columns 1-2) */}
        <div className="cell" style={{gridColumn:'1/3', gridRow:'auto', flexDirection:'row', alignItems:'stretch'}}>
          <div className="cell-header" style={{flexDirection:'row', alignItems:'center', gap:0, borderBottom:'none', borderRight:'1px solid var(--border)', flexShrink:0, padding:'0 14px', minWidth:100, width:100}}>
            <span className="cell-label">Controls</span>
          </div>
          <div className="cell-body" style={{flexDirection:'row', padding:'0 14px'}}>
            <div className="controls-body">
              <button className="ctrl-btn primary" onClick={doStep} disabled={isHalted || animating}>
                <span>▶</span> Step
              </button>
              <div className="ctrl-separator"></div>
              <input
                className="ctrl-n-input"
                type="number"
                value={runN}
                min={1} max={1000}
                onChange={e => setRunN(e.target.value)}
              />
              <button className="ctrl-btn run-n" onClick={doRunN} disabled={isHalted || animating}>
                Run ×{runN}
              </button>
              <button className="ctrl-btn secondary" onClick={doPause} disabled={cpuState !== 'running'}>
                ⏸ Pause
              </button>
              <div className="ctrl-separator"></div>
              <button className="ctrl-btn danger" onClick={doReset}>
                ↺ Reset
              </button>
              <span className="ctrl-hint">
                <kbd>Space</kbd> to step
              </span>
            </div>
          </div>
        </div>

      </div>

      <TweaksPanel>
        <TweakSection label="Accent Color" />
        <TweakColor label="Accent" value={tweaks.accentColor} onChange={v => setTweak('accentColor', v)} />
        <TweakSection label="Pipeline" />
        <TweakToggle label="Animate pipeline stages" value={tweaks.showPipelineAnimation} onChange={v => setTweak('showPipelineAnimation', v)} />
      </TweaksPanel>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
